<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrecheNow - Painel Pais</title>
  <meta name="theme-color" content="#2a66b4">
  <link rel="manifest" href="manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="icon" href="assets/img/favicon.ico" type="image/x-icon">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid px-3">
      <a class="navbar-brand fw-bold" href="#">CRECHENOW</a>
      <div class="d-flex align-items-center gap-2">
        <span class="badge bg-light text-dark d-none d-md-block" id="user-role-badge">Responsável</span>
        <button id="logoutBtn" class="btn btn-sm btn-outline-light">Sair</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4">
      <!-- Feed de Notificações -->
      <div class="col-12 col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h4 mb-0">Comunicados</h2>
          <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-primary active" data-filter="all">Todos</button>
            <button class="btn btn-outline-primary" data-filter="saude">Saúde</button>
            <button class="btn btn-outline-primary" data-filter="pedagogico">Pedagógico</button>
          </div>
        </div>
        <div id="notifications-feed" class="d-flex flex-column gap-3">
          <!-- Renderizado via JS -->
        </div>
      </div>

      <!-- Agenda Semanal -->
      <div class="col-12 col-lg-4">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white fw-semibold">📅 Agenda da Semana</div>
          <div class="card-body p-0">
            <ul class="list-group list-group-flush" id="agenda-list">
              <!-- Renderizado via JS -->
            </ul>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/storage.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <script src="assets/js/notifications.js" defer></script>
  <script src="assets/js/app.js" defer></script>
</body>
</html>
