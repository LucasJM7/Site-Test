<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrecheNow - Painel Creche</title>
  <meta name="theme-color" content="#2a66b4">
  <link rel="manifest" href="manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="icon" href="assets/img/favicon.ico" type="image/x-icon">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid px-3">
      <a class="navbar-brand fw-bold" href="#">CRECHENOW</a>
      <div class="d-flex align-items-center gap-2">
        <span class="badge bg-warning text-dark">Funcionário</span>
        <button id="logoutBtn" class="btn btn-sm btn-outline-light">Sair</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4">
      <!-- Formulário de Envio -->
      <div class="col-12 col-lg-6">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white fw-semibold">📢 Novo Comunicado</div>
          <div class="card-body">
            <form id="staffForm" class="needs-validation" novalidate>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Tipo</label>
                  <select class="form-select" id="notifyType" required>
                    <option value="geral">Geral</option>
                    <option value="saude">Saúde</option>
                    <option value="pedagogico">Pedagógico</option>
                    <option value="reuniao">Reunião</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Público</label>
                  <select class="form-select" id="notifyTarget" required>
                    <option value="all">Todas as turmas</option>
                    <option value="turma-a">Turma A</option>
                    <option value="turma-b">Turma B</option>
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label">Título</label>
                  <input type="text" class="form-control" id="notifyTitle" required maxlength="60">
                </div>
                <div class="col-12">
                  <label class="form-label">Mensagem</label>
                  <textarea class="form-control" id="notifyBody" rows="3" required maxlength="300"></textarea>
                </div>
                <div class="col-12">
                  <button type="submit" class="btn btn-success w-100">Enviar Comunicado</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Histórico de Envios -->
      <div class="col-12 col-lg-6">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white fw-semibold">📋 Histórico de Envios</div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                  <tr><th>Assunto</th><th>Tipo</th><th>Lidos</th><th>Data</th></tr>
                </thead>
                <tbody id="sent-notifications">
                  <!-- Renderizado via JS -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/storage.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <script src="assets/js/notifications.js" defer></script>
  <script src="assets/js/app.js" defer></script>
</body>
</html>
